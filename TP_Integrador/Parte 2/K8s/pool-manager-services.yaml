---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pool-manager-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pool-manager-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pool-manager-rolebinding
subjects:
- kind: ServiceAccount
  name: pool-manager-sa
roleRef:
  kind: Role
  name: pool-manager-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pool-manager
  labels:
    app: pool-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pool-manager
  template:
    metadata:
      labels:
        app: pool-manager
    spec:
      serviceAccountName: pool-manager-sa
      containers:
        - name: pool-manager
          image: josuegaticaodato/pool_manager:latest
          imagePullPolicy: Always
          env:
            - name: RABBIT_HOST
              value: rabbitmq
            - name: RABBIT_PORT
              value: "5672"
            - name: RABBIT_USER
              value: grupo03
            - name: RABBIT_PASS
              value: grupo03
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
