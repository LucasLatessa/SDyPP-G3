apiVersion: apps/v1
kind: Deployment
metadata:
  name: coordinador
  labels:
    app: coordinador
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coordinador
  template:
    metadata:
      labels:
        app: coordinador
    spec:
      containers:
        - name: coordinador
          image: josuegaticaodato/coordinador:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: RABBIT_HOST
              value: rabbitmq
            - name: RABBIT_PORT
              value: "5672"
            - name: RABBIT_USER
              value: grupo03
            - name: RABBIT_PASS
              value: grupo03
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"

---
apiVersion: v1
kind: Service
metadata:
  name: coordinador
spec:
  ports:
    - port: 5000
      targetPort: 5000
  selector:
    app: coordinador
  type: ClusterIP
